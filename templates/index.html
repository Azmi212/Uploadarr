<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uploadarr</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <main class="page">
        <header class="brand">
            <img src="/static/assets/logo.svg" alt="Uploadarr" class="brand-logo">
        </header>

        <section class="app-card">
            <div class="card-top">
                <div class="tabs">
                    <button class="tab active" id="uploadTab">Upload</button>
                    <button class="tab" id="historyTab">Historique</button>
                </div>

                <button class="settings-btn" type="button" aria-label="Paramètres">
                    <img src="/static/assets/settings-icon.svg" alt="">
                </button>
            </div>

            <div class="card-content">
                <!-- UPLOAD -->
                <div class="view active" id="uploadView">
                    <div class="drop-zone" id="dropZone">
                        <img src="/static/assets/upload-icon.svg" alt="" class="upload-icon">
                        <p>Cliquez ou faites glisser<br>le film dans cette zone pour l’upload</p>
                        <label class="small-btn" for="fileInput">Parcourir</label>
                        <input type="file" id="fileInput" accept="video/*,.mkv,.mp4,.avi,.mov" hidden>
                    </div>
                </div>

                <!-- PROGRESS -->
                <div class="view" id="progressView">
                    <div class="progress-box">
                        <h2 id="progressFilename">Nom du fichier</h2>
                        <p id="progressMeta">0% - 0GB / 0GB</p>

                        <div class="progress-track">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                    </div>
                </div>

                <!-- RESULTS -->
                <div class="view" id="resultsView">
                    <div class="import-header">
                        <p>Film détecté :</p>
                        <h2 id="detectedMovieTitle">Titre du film</h2>
                        <span id="importMeta">100% - import prêt</span>
                    </div>

                    <div class="movie-selection">
                        <button class="selected-poster" id="selectedPoster" type="button">
                            <div class="poster-placeholder">Aucun film</div>
                        </button>

                        <div class="movie-strip" id="movieResults"></div>
                    </div>

                    <button class="main-btn" id="importBtn" disabled>
                        Importer le film
                        <img src="/static/assets/upload-2-icon.svg" alt="">
                    </button>
                </div>

                <!-- SUCCESS -->
                <div class="view" id="successView">
                    <div class="success-box">
                        <img src="/static/assets/tick-icon.svg" alt="" class="success-icon">
                        <p>Film importé :</p>
                        <h2 id="successTitle">Film</h2>
                        <span id="successPath"></span>
                    </div>
                </div>

                <!-- HISTORY -->
                <div class="view" id="historyView">
                    <div class="history-list" id="historyList">
                        <p class="empty-history">Aucun upload pour le moment.</p>
                    </div>

                    <button class="show-all-btn" type="button">Afficher tous les uploads</button>
                </div>
            </div>

            <footer class="card-footer">
                <img src="/static/assets/tick-icon.svg" alt="">
                <span>Aucune limite d’upload. Pour toujours.</span>
            </footer>
        </section>

        <footer class="creator">Créer par AZMI212</footer>
    </main>

    <script>
        const uploadTab = document.getElementById("uploadTab");
        const historyTab = document.getElementById("historyTab");

        const uploadView = document.getElementById("uploadView");
        const progressView = document.getElementById("progressView");
        const resultsView = document.getElementById("resultsView");
        const successView = document.getElementById("successView");
        const historyView = document.getElementById("historyView");

        const dropZone = document.getElementById("dropZone");
        const fileInput = document.getElementById("fileInput");

        const progressFilename = document.getElementById("progressFilename");
        const progressMeta = document.getElementById("progressMeta");
        const progressFill = document.getElementById("progressFill");

        const detectedMovieTitle = document.getElementById("detectedMovieTitle");
        const importMeta = document.getElementById("importMeta");
        const selectedPoster = document.getElementById("selectedPoster");
        const movieResults = document.getElementById("movieResults");
        const importBtn = document.getElementById("importBtn");

        const successTitle = document.getElementById("successTitle");
        const successPath = document.getElementById("successPath");

        const historyList = document.getElementById("historyList");

        const CHUNK_SIZE = 5 * 1024 * 1024;

        let uploadedFilename = null;
        let selectedMovie = null;
        let currentResults = [];
        let history = [];

        function showView(view) {
            [uploadView, progressView, resultsView, successView, historyView].forEach(v => {
                v.classList.remove("active");
            });

            view.classList.add("active");
        }

        function setTab(tab) {
            uploadTab.classList.remove("active");
            historyTab.classList.remove("active");
            tab.classList.add("active");
        }

        uploadTab.addEventListener("click", () => {
            setTab(uploadTab);
            showView(uploadView);
        });

        historyTab.addEventListener("click", () => {
            setTab(historyTab);
            renderHistory();
            showView(historyView);
        });

        dropZone.addEventListener("dragover", (e) => {
            e.preventDefault();
            dropZone.classList.add("active");
        });

        dropZone.addEventListener("dragleave", () => {
            dropZone.classList.remove("active");
        });

        dropZone.addEventListener("drop", (e) => {
            e.preventDefault();
            dropZone.classList.remove("active");

            const file = e.dataTransfer.files[0];
            if (file) uploadFile(file);
        });

        fileInput.addEventListener("change", () => {
            const file = fileInput.files[0];
            if (file) uploadFile(file);
        });

        async function uploadFile(file) {
            const totalChunks = Math.ceil(file.size / CHUNK_SIZE);
            const totalSize = formatSize(file.size);

            uploadedFilename = file.name;
            selectedMovie = null;
            currentResults = [];
            importBtn.disabled = true;

            progressFilename.textContent = file.name;
            progressMeta.textContent = `0% - 0GB / ${totalSize}`;
            progressFill.style.width = "0%";

            setTab(uploadTab);
            showView(progressView);

            for (let i = 0; i < totalChunks; i++) {
                const start = i * CHUNK_SIZE;
                const end = Math.min(start + CHUNK_SIZE, file.size);
                const chunk = file.slice(start, end);

                const formData = new FormData();
                formData.append("chunk", chunk);
                formData.append("filename", file.name);
                formData.append("chunkIndex", i);
                formData.append("totalChunks", totalChunks);

                const response = await fetch("/upload/chunk", {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();

                if (data.error) {
                    showError(data.error);
                    return;
                }

                const percent = Math.round(((i + 1) / totalChunks) * 100);
                const uploadedSize = formatSize(Math.min(end, file.size));

                progressFill.style.width = `${percent}%`;
                progressMeta.textContent = `${percent}% - ${uploadedSize} / ${totalSize}`;

                if (i + 1 === totalChunks) {
                    handleUploadFinished(data, totalSize);
                }
            }
        }

        function handleUploadFinished(data, totalSize) {
            importMeta.textContent = `100% - ${totalSize} / ${totalSize}`;
            movieResults.innerHTML = "";

            if (!data.results || data.results.length === 0) {
                detectedMovieTitle.textContent = data.detectedTitle || "Film non détecté";
                selectedPoster.innerHTML = `<div class="poster-placeholder">Aucun résultat</div>`;
                movieResults.innerHTML = `
                    <div class="no-result">
                        <p>Aucun résultat trouvé.</p>
                        <button class="retry-btn" onclick="location.reload()">
                            Réessayer
                        </button>
                    </div>
                `;
                showView(resultsView);
                return;
            }

            renderMovieChoices(data.results);
            showView(resultsView);
        }

        function renderMovieChoices(results) {
            currentResults = results;
            selectedMovie = results[0];
            importBtn.disabled = false;

            updateSelectedMovie(selectedMovie);
            renderOtherChoices();
        }

        function updateSelectedMovie(movie) {
            const poster = getPoster(movie);

            detectedMovieTitle.textContent = `${movie.title} (${movie.year || "?"})`;

            selectedPoster.innerHTML = poster
                ? `<img src="${poster}" alt="${movie.title}">`
                : `<div class="poster-placeholder">${movie.title}</div>`;
        }

        function renderOtherChoices() {
            movieResults.innerHTML = "";

            currentResults.forEach((movie) => {
                if (selectedMovie && movie.tmdbId === selectedMovie.tmdbId) {
                    return;
                }

                const poster = getPoster(movie);

                const card = document.createElement("button");
                card.className = "poster-card";
                card.type = "button";

                card.innerHTML = poster
                    ? `<img src="${poster}" alt="${movie.title}">`
                    : `<div class="poster-placeholder">${movie.title}</div>`;

                card.addEventListener("click", () => {
                    selectedMovie = movie;
                    updateSelectedMovie(movie);
                    renderOtherChoices();
                    importBtn.disabled = false;
                });

                movieResults.appendChild(card);
            });
        }

        importBtn.addEventListener("click", async () => {
            if (!selectedMovie || !uploadedFilename) return;

            importBtn.disabled = true;
            importBtn.innerHTML = "Import en cours...";

            const response = await fetch("/import", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    filename: uploadedFilename,
                    movie: selectedMovie
                })
            });

            const data = await response.json();

            if (data.error) {
                showError(data.error);
                importBtn.disabled = false;
                importBtn.innerHTML = `Importer le film <img src="/static/assets/upload-2-icon.svg" alt="">`;
                return;
            }

            const title = selectedMovie.title + " (" + selectedMovie.year + ")";

            history.unshift({
                title: title,
                time: "à l’instant",
                size: "OK",
                status: "success"
            });

            successTitle.textContent = title;
            successPath.textContent = data.targetPath || "";

            importBtn.innerHTML = `Importer le film <img src="/static/assets/upload-2-icon.svg" alt="">`;

            showView(successView);
        });

        function renderHistory() {
            if (history.length === 0) {
                historyList.innerHTML = `<p class="empty-history">Aucun upload pour le moment.</p>`;
                return;
            }

            historyList.innerHTML = "";

            history.forEach(item => {
                const row = document.createElement("div");
                row.className = "history-row";

                row.innerHTML = `
                    <div class="history-left">
                        <img src="/static/assets/video-file-icon.svg" alt="">
                        <div>
                            <strong>${item.title}</strong>
                            <span>${item.time}</span>
                        </div>
                    </div>
                    <div class="history-right">
                        <span class="size-tag">${item.size}</span>
                        <span class="dots">⋮</span>
                    </div>
                `;

                historyList.appendChild(row);
            });
        }

        function getPoster(movie) {
            if (movie.remotePoster) return movie.remotePoster;

            if (movie.images && movie.images.length > 0) {
                const poster = movie.images.find(img => img.coverType === "poster");
                if (poster && poster.remoteUrl) return poster.remoteUrl;
            }

            return null;
        }

        function showError(error) {
            history.unshift({
                title: uploadedFilename || "Upload",
                time: "à l’instant",
                size: "Erreur",
                status: "error"
            });

            detectedMovieTitle.textContent = "Erreur";
            importMeta.textContent = error;
            selectedPoster.innerHTML = `<div class="poster-placeholder">Erreur</div>`;
            movieResults.innerHTML = `
                <div class="no-result">
                    <p>${error}</p>
                    <button class="retry-btn" onclick="location.reload()">
                        <img src="/static/assets/retry-icon.svg" alt="">
                        Réessayer
                    </button>
                </div>
            `;
            showView(resultsView);
        }

        function formatSize(bytes) {
            if (!bytes || bytes === 0) return "0GB";

            const gb = bytes / (1024 * 1024 * 1024);
            if (gb >= 1) return `${gb.toFixed(1)}GB`;

            const mb = bytes / (1024 * 1024);
            return `${Math.round(mb)}MB`;
        }
    </script>
</body>
</html>
